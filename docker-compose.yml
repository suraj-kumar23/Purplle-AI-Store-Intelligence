services:

  backend:

    build:
      context: .
      dockerfile: Dockerfile.backend

    container_name: store_backend

    ports:
      - "8000:8000"

  dashboard:

    build:
      context: .
      dockerfile: Dockerfile.dashboard

    container_name: store_dashboard

    ports:
      - "5173:5173"

    depends_on:
      - backend